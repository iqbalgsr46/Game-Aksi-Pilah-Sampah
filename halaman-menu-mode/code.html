<script>
    const container = document.getElementById('threejs-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 2, 8);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Character Group
    const character = new THREE.Group();
    scene.add(character);

    // Body
    const bodyGeo = new THREE.CapsuleGeometry(0.8, 1, 4, 16);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0x8aebff, shininess: 30 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.5;
    character.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.6, 16, 16);
    const headMat = new THREE.MeshPhongMaterial({ color: 0x8aebff, shininess: 30 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.8;
    character.add(head);

    // Arms
    const armGeo = new THREE.CapsuleGeometry(0.2, 0.8, 4, 16);
    const armMat = new THREE.MeshPhongMaterial({ color: 0x8aebff });
    
    const rightArmGroup = new THREE.Group();
    rightArmGroup.position.set(1.0, 2.0, 0);
    const rightArm = new THREE.Mesh(armGeo, armMat);
    rightArm.position.set(0, -0.4, 0);
    rightArmGroup.add(rightArm);
    character.add(rightArmGroup);
    
    const leftArmGroup = new THREE.Group();
    leftArmGroup.position.set(-1.0, 2.0, 0);
    const leftArm = new THREE.Mesh(armGeo, armMat);
    leftArm.position.set(0, -0.4, 0);
    leftArmGroup.rotation.z = Math.PI / 8;
    leftArmGroup.add(leftArm);
    character.add(leftArmGroup);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.1, 16, 16);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x001f25 });
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.25, 2.9, 0.55);
    character.add(rightEye);
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.25, 2.9, 0.55);
    character.add(leftEye);

    // Bottle
    const bottleGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.4, 16);
    const bottleMat = new THREE.MeshPhongMaterial({ color: 0x4de082, transparent: true, opacity: 0.9 });
    const bottle = new THREE.Mesh(bottleGeo, bottleMat);
    scene.add(bottle);

    // Animation Loop Variables
    const clock = new THREE.Clock();
    let time = 0;
    const CYCLE_DURATION = 3.0;

    function animate() {
        requestAnimationFrame(animate);
        
        const delta = clock.getDelta();
        time = (time + delta) % CYCLE_DURATION;
        
        // Jelly Breathing
        const breathScale = 1 + Math.sin(time * Math.PI * 2) * 0.03;
        character.scale.set(1, breathScale, 1);
        character.position.y = Math.sin(time * Math.PI * 2) * 0.05;

        // Phases
        if (time < 0.3) {
            // Phase 1: Preparation (0.0 - 0.3s)
            const progress = time / 0.3;
            rightArmGroup.rotation.x = -Math.PI * 0.5 * progress;
            rightArmGroup.rotation.z = -Math.PI / 8;
            
            // Bottle follows hand
            const handPos = new THREE.Vector3(0, -0.8, 0);
            handPos.applyMatrix4(rightArmGroup.matrixWorld);
            bottle.position.copy(handPos);
            bottle.rotation.x = rightArmGroup.rotation.x;
            bottle.visible = true;
        } else if (time < 0.6) {
            // Phase 2: Throwing (0.3 - 0.6s)
            const progress = (time - 0.3) / 0.3;
            rightArmGroup.rotation.x = -Math.PI * 0.5 + (Math.PI * 0.8 * progress);
            
            // Parabolic trajectory for bottle
            const startX = 1.0;
            const startY = 2.0;
            const targetX = 3.5;
            const targetY = 0.5;
            
            bottle.position.x = startX + (targetX - startX) * progress;
            bottle.position.y = startY + Math.sin(progress * Math.PI) * 1.5 - (startY - targetY) * progress;
            bottle.position.z = -progress * 1.0;
            bottle.rotation.x += 0.2;
            
            if (progress > 0.9) bottle.visible = false;
        } else {
            // Phase 3: Recovery (0.6 - 3.0s)
            const progress = Math.min((time - 0.6) / 0.4, 1.0);
            rightArmGroup.rotation.x = (Math.PI * 0.3) * (1 - progress);
            rightArmGroup.rotation.z = -Math.PI / 8;
            bottle.visible = false;
        }

        renderer.render(scene, camera);
    }

    animate();

    // Handle window resize for container
    window.addEventListener('resize', () => {
        if (container.clientWidth && container.clientHeight) {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
    });
</script>
